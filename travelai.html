<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Travel Planner</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">

<div id="root"></div>

<script type="text/babel">
const {
  useState
} = React;

function TravelPlanner() {
  const [location, setLocation] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [results, setResults] = useState(null);

  const generateMockData = (loc) => ({
    city: loc,
    intro:
      `${loc} is a beautiful destination full of culture, food, and adventure.`,
    places: [
      {
        name: 'Historic Old Town',
        type: 'Cultural',
        rating: 4.8,
      },
      {
        name: 'Central Park & Gardens',
        type: 'Nature',
        rating: 4.7,
      },
      {
        name: 'Grand Museum',
        type: 'Museum',
        rating: 4.6,
      },
    ],
    hotels: [
      {
        name: 'The Grand Plaza',
        price: '$280',
      },
      {
        name: 'Boutique Heritage Inn',
        price: '$145',
      },
    ],
    weather: {
      avg: 22,
      condition: 'Mostly Sunny',
    }
  });

  const handleSearch = () => {
    if (!location || !startDate || !endDate) return;

    setResults(generateMockData(location));
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 p-6">
      <div className="max-w-4xl mx-auto">

        <div className="text-center mb-8">
          <h1 className="text-5xl font-bold text-slate-800 mb-3">
            AI Travel Planner
          </h1>

          <p className="text-slate-500">
            Plan your next adventure
          </p>
        </div>

        <div className="bg-white rounded-3xl shadow-xl p-6 mb-8">
          <div className="grid md:grid-cols-3 gap-4">

            <input
              type="text"
              placeholder="Destination"
              value={location}
              onChange={(e) => setLocation(e.target.value)}
              className="p-3 rounded-xl border"
            />

            <input
              type="date"
              value={startDate}
              onChange={(e) => setStartDate(e.target.value)}
              className="p-3 rounded-xl border"
            />

            <input
              type="date"
              value={endDate}
              onChange={(e) => setEndDate(e.target.value)}
              className="p-3 rounded-xl border"
            />
          </div>

          <button
            onClick={handleSearch}
            className="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl"
          >
            Plan My Trip
          </button>
        </div>

        {results && (
          <div className="space-y-6">

            <div className="bg-white rounded-2xl p-6 shadow">
              <h2 className="text-3xl font-bold mb-3">
                {results.city}
              </h2>

              <p className="text-slate-600">
                {results.intro}
              </p>
            </div>

            <div className="bg-white rounded-2xl p-6 shadow">
              <h3 className="text-2xl font-bold mb-4">
                Places to Visit
              </h3>

              <div className="grid md:grid-cols-2 gap-4">
                {results.places.map((place, i) => (
                  <div
                    key={i}
                    className="border rounded-xl p-4"
                  >
                    <div className="flex justify-between mb-2">
                      <span className="text-sm bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">
                        {place.type}
                      </span>

                      <span>
                        ⭐ {place.rating}
                      </span>
                    </div>

                    <h4 className="font-bold text-lg">
                      {place.name}
                    </h4>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 shadow">
              <h3 className="text-2xl font-bold mb-4">
                Hotels
              </h3>

              <div className="space-y-3">
                {results.hotels.map((hotel, i) => (
                  <div
                    key={i}
                    className="border rounded-xl p-4 flex justify-between"
                  >
                    <div>
                      <h4 className="font-bold">
                        {hotel.name}
                      </h4>
                    </div>

                    <div className="font-bold text-indigo-600">
                      {hotel.price}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-2xl p-6 shadow">
              <h3 className="text-2xl font-bold mb-2">
                Weather
              </h3>

              <div className="text-5xl font-bold">
                {results.weather.avg}°
              </div>

              <p className="text-blue-100 mt-2">
                {results.weather.condition}
              </p>
            </div>

          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(
  document.getElementById('root')
);

root.render(<TravelPlanner />);
</script>

</body>
</html>
